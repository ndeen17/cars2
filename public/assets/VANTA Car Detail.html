document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ks — a VANTA specialist will be in touch about the Lumen GT within 24 hours.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onSubmit }}\" style=\"display:flex; flex-direction:column; gap:18px;\">\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n              <label style=\"display:flex; flex-direction:column; gap:7px; font-size:13px; color:#6c6c74;\">Full name\n                <input required=\"\" type=\"text\" placeholder=\"Alex Morgan\" style=\"background:#f4f3f0; border:1px solid rgba(0,0,0,0.12); border-radius:10px; padding:13px 14px; color:#18181c; font-size:15px; outline:none;\">\n              <\u002Flabel>\n              <label style=\"display:flex; flex-direction:column; gap:7px; font-size:13px; color:#6c6c74;\">Phone\n                <input type=\"tel\" placeholder=\"(555) 012 3456\" style=\"background:#f4f3f0; border:1px solid rgba(0,0,0,0.12); border-radius:10px; padding:13px 14px; color:#18181c; font-size:15px; outline:none;\">\n              <\u002Flabel>\n            <\u002Fdiv>\n            <label style=\"display:flex; flex-direction:column; gap:7px; font-size:13px; color:#6c6c74;\">Email\n              <input required=\"\" type=\"email\" placeholder=\"you@email.com\" style=\"background:#f4f3f0; border:1px solid rgba(0,0,0,0.12); border-radius:10px; padding:13px 14px; color:#18181c; font-size:15px; outline:none;\">\n            <\u002Flabel>\n            <label style=\"display:flex; flex-direction:column; gap:7px; font-size:13px; color:#6c6c74;\">Preferred date\n              <input type=\"date\" style=\"background:#f4f3f0; border:1px solid rgba(0,0,0,0.12); border-radius:10px; padding:12px 14px; color:#18181c; font-size:15px; outline:none;\">\n            <\u002Flabel>\n            <label style=\"display:flex; flex-direction:column; gap:7px; font-size:13px; color:#6c6c74;\">Anything else?\n              <textarea rows=\"3\" placeholder=\"Preferred showroom, financing, trade-in…\" style=\"background:#f4f3f0; border:1px solid rgba(0,0,0,0.12); border-radius:10px; padding:13px 14px; color:#18181c; font-size:15px; outline:none; resize:vertical;\"><\u002Ftextarea>\n            <\u002Flabel>\n            <button type=\"submit\" style=\"background:#18181c; color:#f5f4f1; font-family:'Manrope',sans-serif; font-weight:700; font-size:15px; padding:16px; border:none; border-radius:999px; cursor:pointer; margin-top:4px;\">Request test drive<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid rgba(0,0,0,0.08); background:#eceae5;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:36px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;\">\n      <span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:18px; letter-spacing:2px; color:#18181c;\">VANTA<\u002Fspan>\n      <span style=\"font-size:13px; color:#9a9aa0;\">© 2026 VANTA Motors. All rights reserved.<\u002Fspan>\n      <div style=\"display:flex; gap:22px; font-size:13px; color:#6c6c74;\"><span>Privacy<\u002Fspan><span>Terms<\u002Fspan><span>Cookies<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- AI CHATBOT -->\n  <div style=\"position:fixed; bottom:28px; right:28px; z-index:200; display:flex; flex-direction:column; align-items:flex-end; gap:14px;\">\n    <sc-if value=\"{{ chatOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:380px; background:#ffffff; border:1px solid rgba(0,0,0,0.1); border-radius:22px; box-shadow:0 24px 64px rgba(0,0,0,0.16), 0 4px 16px rgba(0,0,0,0.08); overflow:hidden; animation:chatSlide 0.28s cubic-bezier(0.22,1,0.36,1) both;\">\n        <!-- Header -->\n        <div style=\"background:#18181c; padding:18px 20px 16px; display:flex; align-items:center; justify-content:space-between;\">\n          <div style=\"display:flex; align-items:center; gap:12px;\">\n            <div style=\"width:34px; height:34px; border-radius:11px; background:rgba(125,232,192,0.12); border:1px solid rgba(125,232,192,0.26); display:flex; align-items:center; justify-content:center; font-size:16px; color:#7de8c0; flex:none;\">✦<\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#ffffff; letter-spacing:0.4px;\">VANTA AI<\u002Fdiv>\n              <div style=\"font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px;\">Ask me anything about the Lumen GT<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeChat }}\" style=\"background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.5); width:30px; height:30px; border-radius:9px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; font-family:inherit; flex:none;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <!-- Messages -->\n        <div id=\"chat-msgs\" style=\"height:310px; overflow-y:auto; padding:16px 14px 10px; display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\">\n            <div style=\"width:28px; height:28px; border-radius:8px; background:#18181c; flex:none; display:flex; align-items:center; justify-content:center; font-size:12px; color:#7de8c0;\">✦<\u002Fdiv>\n            <div style=\"background:#f4f3f0; border-radius:14px 14px 14px 4px; padding:11px 14px; font-size:14px; line-height:1.55; color:#18181c; max-width:270px;\">Hi! I'm your Lumen GT specialist. Ask me about range, performance, charging, or anything you need to know.<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ chatMessages }}\" as=\"msg\" hint-placeholder-count=\"0\">\n            <div style=\"{{ msg.wrapStyle }}\">\n              <sc-if value=\"{{ msg.isAssistant }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:28px; height:28px; border-radius:8px; background:#18181c; flex:none; display:flex; align-items:center; justify-content:center; font-size:12px; color:#7de8c0;\">✦<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"{{ msg.bubbleStyle }}\">{{ msg.content }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ chatLoading }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; gap:8px; align-items:flex-start;\">\n              <div style=\"width:28px; height:28px; border-radius:8px; background:#18181c; flex:none; display:flex; align-items:center; justify-content:center; font-size:12px; color:#7de8c0;\">✦<\u002Fdiv>\n              <div style=\"background:#f4f3f0; border-radius:14px 14px 14px 4px; padding:14px 18px; display:flex; gap:5px; align-items:center;\">\n                <span style=\"width:6px; height:6px; border-radius:50%; background:#9a9aa0; display:inline-block; animation:dotPulse 1.4s ease infinite;\"><\u002Fspan>\n                <span style=\"width:6px; height:6px; border-radius:50%; background:#9a9aa0; display:inline-block; animation:dotPulse 1.4s 0.22s ease infinite;\"><\u002Fspan>\n                <span style=\"width:6px; height:6px; border-radius:50%; background:#9a9aa0; display:inline-block; animation:dotPulse 1.4s 0.44s ease infinite;\"><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <!-- Input -->\n        <div style=\"padding:12px 14px 14px; border-top:1px solid rgba(0,0,0,0.07); display:flex; gap:8px;\">\n          <input type=\"text\" placeholder=\"Ask about range, specs, charging…\" value=\"{{ chatInput }}\" onchange=\"{{ onChatChange }}\" onkeydown=\"{{ onChatKeyDown }}\" style=\"flex:1; background:#f4f3f0; border:1px solid rgba(0,0,0,0.1); border-radius:11px; padding:10px 14px; font-size:14px; color:#18181c; outline:none; font-family:inherit;\">\n          <button onclick=\"{{ sendChat }}\" style=\"background:#18181c; color:#ffffff; border:none; border-radius:11px; padding:10px 18px; font-size:14px; cursor:pointer; font-weight:600; font-family:'Manrope',sans-serif; white-space:nowrap; min-width:64px;\">{{ chatBtnLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <!-- Floating trigger -->\n    <button onclick=\"{{ toggleChat }}\" style=\"background:#18181c; color:#ffffff; border:none; border-radius:999px; padding:14px 24px; font-size:14px; font-weight:700; font-family:'Manrope',sans-serif; cursor:pointer; display:flex; align-items:center; gap:9px; box-shadow:0 8px 32px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.1);\">\n      <span style=\"font-size:16px; color:#7de8c0; line-height:1; flex:none;\">✦<\u002Fspan>Ask the AI\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    specTab: 'Performance',\n    chatOpen: false,\n    messages: [],\n    chatInput: '',\n    chatLoading: false,\n    submitted: false,\n  };\n\n  get allSpecs() {\n    return {\n      Performance: [\n        { k: 'Power output',   v: '670 hp'         },\n        { k: 'Torque',         v: '824 lb-ft'       },\n        { k: '0–60 mph',       v: '2.9 s'           },\n        { k: 'Top speed',      v: '168 mph'         },\n        { k: 'Drivetrain',     v: 'AWD · Tri-motor' },\n        { k: 'Curb weight',    v: '4,850 lbs'       },\n      ],\n      'Range & Charging': [\n        { k: 'EPA estimated range',   v: '405 mi'          },\n        { k: 'Battery capacity',      v: '105 kWh (usable)'},\n        { k: 'DC fast charge',        v: '250 kW'          },\n        { k: 'Charge time (10–80%)',  v: '18 min'          },\n        { k: 'AC on-board charger',   v: '11.5 kW'         },\n        { k: 'Connector type',        v: 'CCS / Type 2'    },\n      ],\n      Dimensions: [\n        { k: 'Length',               v: '192.4 in'  },\n        { k: 'Width (no mirrors)',    v: '77.2 in'   },\n        { k: 'Height',               v: '53.1 in'   },\n        { k: 'Wheelbase',            v: '118.3 in'  },\n        { k: 'Front trunk',          v: '14 cu ft'  },\n        { k: 'Rear cargo',           v: '28 cu ft'  },\n      ],\n      Features: [\n        { k: 'Seating',          v: '4 adults'            },\n        { k: 'Infotainment',     v: '17\" touchscreen'     },\n        { k: 'Rear display',     v: '12\" dual screens'    },\n        { k: 'Driver assistance',v: 'Level 2+'            },\n        { k: 'Battery warranty', v: '8 yr / 150,000 mi'   },\n        { k: 'Vehicle warranty', v: '4 yr / 50,000 mi'    },\n      ],\n    };\n  }\n\n  tabStyle(label) {\n    const active = label === this.state.specTab;\n    return {\n      fontFamily: \"'Manrope', sans-serif\",\n      fontWeight: 600,\n      fontSize: '14px',\n      padding: '9px 22px',\n      borderRadius: '9px',\n      cursor: 'pointer',\n      border: 'none',\n      background: active ? '#ffffff' : 'transparent',\n      color: active ? '#18181c' : '#6c6c74',\n      boxShadow: active ? '0 1px 5px rgba(0,0,0,0.1)' : 'none',\n      transition: 'all 0.18s ease',\n      whiteSpace: 'nowrap',\n    };\n  }\n\n  scrollToSection(id) {\n    const el = document.getElementById(id);\n    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 40, behavior: 'smooth' });\n  }\n\n  componentDidUpdate() {\n    const el = document.getElementById('chat-msgs');\n    if (el) el.scrollTop = el.scrollHeight;\n  }\n\n  async sendChat() {\n    const input = this.state.chatInput.trim();\n    if (!input || this.state.chatLoading) return;\n\n    const userMsg = { role: 'user', content: input, isUser: true, isAssistant: false };\n    const history = [...this.state.messages, userMsg];\n    this.setState({ messages: history, chatInput: '', chatLoading: true });\n\n    const SYSTEM = 'You are a knowledgeable VANTA Motors specialist, expert on the Lumen GT Sport Coupe (2026, $89,000). Key specs: 670 hp, AWD tri-motor, 0–60 in 2.9 s, 168 mph top speed, 405 mi EPA range, 105 kWh battery, 250 kW DC fast charge (10–80% in 18 min), 4 seats, 17\" infotainment, 8yr/150k mi battery warranty. Answer warmly and concisely in 2–3 sentences. Encourage the enquiry form for test drives.';\n\n    try {\n      const reply = await window.claude.complete({\n        system: SYSTEM,\n        messages: history.map(m => ({ role: m.role, content: m.content })),\n      });\n      this.setState(s => ({\n        messages: [...s.messages, { role: 'assistant', content: reply, isUser: false, isAssistant: true }],\n        chatLoading: false,\n      }));\n    } catch (e) {\n      this.setState(s => ({\n        messages: [...s.messages, { role: 'assistant', content: \"I'm having trouble connecting right now. Please try again shortly, or fill out the enquiry form below.\", isUser: false, isAssistant: true }],\n        chatLoading: false,\n      }));\n    }\n  }\n\n  renderVals() {\n    const tabs = ['Performance', 'Range & Charging', 'Dimensions', 'Features'];\n    const specData = this.allSpecs[this.state.specTab] || [];\n    const activeSpecs = specData.map((s, i, arr) => ({\n      ...s,\n      rowStyle: {\n        display: 'flex',\n        borderBottom: i < arr.length - 1 ? '1px solid rgba(0,0,0,0.05)' : 'none',\n        background: i % 2 === 0 ? '#ffffff' : '#faf9f7',\n      },\n    }));\n\n    const chatMessages = this.state.messages.map(m => ({\n      ...m,\n      wrapStyle: m.role === 'user'\n        ? { display: 'flex', justifyContent: 'flex-end' }\n        : { display: 'flex', gap: '8px', alignItems: 'flex-start' },\n      bubbleStyle: m.role === 'user'\n        ? { background: '#18181c', color: '#ffffff', borderRadius: '14px 14px 4px 14px', padding: '10px 14px', fontSize: '14px', lineHeight: '1.55', maxWidth: '270px', wordBreak: 'break-word' }\n        : { background: '#f4f3f0', color: '#18181c', borderRadius: '14px 14px 14px 4px', padding: '10px 14px', fontSize: '14px', lineHeight: '1.55', maxWidth: '270px', wordBreak: 'break-word' },\n    }));\n\n    return {\n      quickStats: [\n        { k: 'Range',     v: '405 mi'  },\n        { k: '0–60 mph',  v: '2.9 s'   },\n        { k: 'Top speed', v: '168 mph' },\n        { k: 'Power',     v: '670 hp'  },\n      ],\n\n      specTabs: tabs.map(label => ({\n        label,\n        style: this.tabStyle(label),\n        onClick: () => this.setState({ specTab: label }),\n      })),\n      activeSpecs,\n\n      similarCars: [\n        { id: 'marque', name: 'Marque S', segment: 'Luxury Sedan · Electric', body: 'Sedan', price: '$112,000' },\n        { id: 'nova',   name: 'Nova',     segment: 'Electric Coupe',          body: 'Coupe', price: '$58,000'  },\n        { id: 'drift',  name: 'Drift R',  segment: 'Track Coupe · Petrol',    body: 'Coupe', price: '$76,000'  },\n      ],\n\n      assurances: [\n        'Test drives at a showroom or delivered to you',\n        'Transparent, all-in pricing — no surprises',\n        'Trade-in valuation in under 5 minutes',\n      ],\n\n      submitted:  this.state.submitted,\n      showForm:   !this.state.submitted,\n      onSubmit:   (e) => { e.preventDefault(); this.setState({ submitted: true }); },\n\n      chatOpen:     this.state.chatOpen,\n      chatMessages,\n      chatInput:    this.state.chatInput,\n      chatLoading:  this.state.chatLoading,\n      chatBtnLabel: this.state.chatLoading ? '···' : 'Send',\n      onChatChange:  (e) => this.setState({ chatInput: e.target.value }),\n      onChatKeyDown: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendChat(); } },\n      sendChat:      () => this.sendChat(),\n      toggleChat:    () => this.setState(s => ({ chatOpen: !s.chatOpen })),\n      closeChat:     () => this.setState({ chatOpen: false }),\n\n      scrollToEnquiry: () => this.scrollToSection('enquiry'),\n      scrollToGallery: () => this.scrollToSection('gallery'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
